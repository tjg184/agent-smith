version: 2
builds:
  - main: .
    binary: agent-smith
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: "agent-smith_{{ .Os }}_{{ .Arch }}"
    extra_files:
      - glob: README.md
      - glob: LICENSE

release:
  github:
    owner: tjg184 
    name: agent-smith 

changelog:
  sort: asc

checksum:
  name_template: "checksums.txt"
