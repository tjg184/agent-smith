tasks:
  - title: "Story-001: As a user, I want to define profiles in a specific directory so that the system can recognize them. - Profiles are located in ~/.agents/profiles/<profile_name>/, Each profile directory mirrors the standard structure (agents/, commands/, skills/), The system ignores incomplete or malformed profile directories gracefully."
    completed: false
    parallel_group: 0
  - title: "Story-002: As a user, I want to list available profiles so that I can see what configurations are available. - New command `agent-smith profiles list` (or similar), output shows the names of all valid profiles found in ~/.agents/profiles/, Indicates which profile (if any) is currently active."
    completed: false
    parallel_group: 1
  - title: "Story-003: As a user, I want to activate a specific profile so that its tools replace the currently active ones. - Command `agent-smith profiles activate <name>`, If another profile is active, it is automatically deactivated (unlinked) first, Validates that the target profile exists, Symlinks the profile's contents (agents, skills, commands) to the source of truth locations, Updates a state file (e.g., ~/.agents/active_profile) to reflect the new active profile, Crucial: Activation is isolated; it does not merge with the previous profile."
    completed: false
    parallel_group: 2
  - title: "Story-004: As a user, I want to deactivate the current profile so that I can return to a base state. - Command `agent-smith profiles deactivate`, Removes all symlinks associated with the currently active profile, Clears the active profile state, Does not affect manually installed (non-profile) tools if they exist."
    completed: false
    parallel_group: 2
  - title: "Story-005: As a user, I want to see the current status so that I know which profile is active. - Command `agent-smith profiles status`, Displays the name of the active profile or \"None\", Optionally lists the count of active agents/skills from the profile."
    completed: false
    parallel_group: 1
