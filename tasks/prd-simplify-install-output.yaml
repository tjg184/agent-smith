tasks:
  - title: "Story-001: As a user, I want single component installations to show a concise one-line summary so that my terminal stays clean and readable - Single installations display format: 'Installed: component-name ✓', Storage path information removed, Success checkmark shows installation succeeded, Failed installations show 'Failed: component-name ✗' with error message"
    completed: false
    parallel_group: 0
  - title: "Story-002: As a user, I want bulk installations to show a progress indicator so that I know the system is working without verbose per-component messages - Display 'Installing X components...' at start, Show progress indicator (spinner or progress bar) during installation, Per-component output minimal or hidden, Progress indicator updates as each component completes"
    completed: false
    parallel_group: 0
  - title: "Story-003: As a user, I want to see a summary table after bulk installations so that I can quickly review what was installed successfully - Summary table displays after completion, Table shows component names grouped by type, Each row indicates success ✓ or failure ✗ status, Summary includes totals: 'Successfully installed: X/Y components', Failed components show brief error reason"
    completed: false
    parallel_group: 1
  - title: "Story-004: As a developer, I want to refactor output formatting logic into a centralized module so that output formatting is consistent across all downloaders - Create new output formatter package/module, Centralize success/failure message formatting, Centralize progress indicator logic, Centralize summary table generation, Update command.go, bulk.go, skill.go, agent.go to use formatter"
    completed: false
    parallel_group: 0
